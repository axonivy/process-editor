packages:
  - packages/*
  - integration/*
  - playwright
allowBuilds:
  '@swc/core': false
minimumReleaseAgeExclude:
  - '@axonivy/*'
overrides:
  dompurify@>=3.1.3 <=3.3.1: '>=3.3.2'
  lodash@<=4.17.23: '>=4.18.0'
  uuid@<14.0.0: '>=14.0.0'
patchedDependencies:
  monaco-editor: patches/monaco-editor.patch
preferWorkspacePackages: true
publicHoistPattern:
  - eslint
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200 # minutes (30 days)
verifyDepsBeforeRun: warn
