packages:
  - packages/*
  - integration/*
  - playwright
allowBuilds:
  '@swc/core': false
  es5-ext: false
  esbuild: false
  monaco-languageclient: true
minimumReleaseAgeExclude:
  - '@axonivy/*'
overrides:
  dompurify@>=3.1.3 <=3.3.1: '>=3.3.2'
  lodash@<=4.17.23: '>=4.18.0'
  typescript-cp>tar: '>=7.5.11'
  uuid@<14.0.0: '>=14.0.0'
preferWorkspacePackages: true
publicHoistPattern:
  - eslint
  - monaco-editor
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200 # minutes (30 days)
verifyDepsBeforeRun: warn
